<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timbrature">
<title>Timbrature</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --green: #00d4aa;
  --amber: #ffa500;
  --text: #e8e8f0;
  --text2: #8888aa;
  --text3: #44445a;
  --border: rgba(255,255,255,0.07);
  --radius: 14px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom);
}

/* subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(233,69,96,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(233,69,96,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; padding: 0 16px 100px; }

/* ---- HEADER ---- */
header {
  padding: 24px 0 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.logo {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}
.logo span { color: var(--accent); }
.week-badge {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  margin-top: 4px;
}

/* ---- WEEK NAV ---- */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 20px;
}
.nav-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  padding: 6px 14px;
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.week-title { text-align: center; }
.week-title .label { font-weight: 600; font-size: 14px; }
.week-title .dates { font-family: var(--mono); font-size: 11px; color: var(--text2); margin-top: 2px; }

/* ---- PROGRESS RING ---- */
.progress-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.ring-wrap { flex-shrink: 0; position: relative; width: 90px; height: 90px; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.ring-pct { font-family: var(--mono); font-size: 18px; font-weight: 700; line-height: 1; }
.ring-label { font-size: 9px; color: var(--text2); margin-top: 2px; letter-spacing: 0.5px; }
.progress-info { flex: 1; }
.big-hours { font-family: var(--mono); font-size: 28px; font-weight: 700; line-height: 1; }
.big-hours small { font-size: 13px; color: var(--text2); font-weight: 400; }
.diff-line { margin-top: 6px; font-size: 13px; font-weight: 600; }
.diff-pos { color: var(--green); }
.diff-neg { color: var(--accent); }
.diff-zero { color: var(--text2); }
.target-line { font-size: 11px; color: var(--text2); margin-top: 4px; font-family: var(--mono); }

/* ---- DAYS ---- */
.days-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: border-color 0.2s;
}
.day-card.today { border-color: rgba(233,69,96,0.4); }
.day-card.today .day-name { color: var(--accent); }

.day-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.day-name { font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
.day-date { font-family: var(--mono); font-size: 11px; color: var(--text2); }
.day-result { font-family: var(--mono); font-size: 16px; font-weight: 700; }
.day-result.pos { color: var(--green); }
.day-result.neg { color: var(--accent); }
.day-result.empty { color: var(--text3); }
.day-sub { font-family: var(--mono); font-size: 10px; margin-top: 2px; text-align: right; }

.day-inputs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.input-group label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text2);
  letter-spacing: 0.5px;
  margin-bottom: 5px;
  text-transform: uppercase;
}
.input-group input[type="time"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 16px;
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
  appearance: none;
}
.input-group input[type="time"]:focus { border-color: var(--accent); }
.input-group input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

/* ---- SUMMARY ROW ---- */
.summary-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.stat-val { font-family: var(--mono); font-size: 15px; font-weight: 700; }
.stat-lbl { font-size: 10px; color: var(--text2); margin-top: 3px; letter-spacing: 0.5px; }

/* ---- FOOTER ---- */
.footer-note {
  text-align: center;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 16px;
  line-height: 1.8;
}
.clear-btn {
  display: block;
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text2);
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.clear-btn:hover { border-color: var(--accent); color: var(--accent); }

/* install banner */
#install-banner {
  display: none;
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: white;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  padding: 12px 24px;
  border-radius: 30px;
  cursor: pointer;
  z-index: 999;
  box-shadow: 0 4px 20px rgba(233,69,96,0.5);
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="app">
  <header>
    <div>
      <div class="logo">TIMBR<span>.</span></div>
      <div class="week-badge" id="week-badge">W00 · 2025</div>
    </div>
  </header>

  <div class="week-nav">
    <button class="nav-btn" id="btn-prev">← PREC</button>
    <div class="week-title">
      <div class="label" id="nav-label">Settimana corrente</div>
      <div class="dates" id="nav-dates">–</div>
    </div>
    <button class="nav-btn" id="btn-next" disabled>SUCC →</button>
  </div>

  <div class="progress-card">
    <div class="ring-wrap">
      <svg width="90" height="90" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r="38" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="7"/>
        <circle cx="45" cy="45" r="38" fill="none" stroke="var(--accent)" stroke-width="7"
          stroke-linecap="round" stroke-dasharray="238.76" stroke-dashoffset="238.76"
          id="ring-circle" style="transition: stroke-dashoffset 0.5s ease, stroke 0.3s"/>
      </svg>
      <div class="ring-center">
        <span class="ring-pct" id="ring-pct">0%</span>
        <span class="ring-label">SETT.</span>
      </div>
    </div>
    <div class="progress-info">
      <div class="big-hours" id="big-hours">0h 00m <small>/ 38h 00m</small></div>
      <div class="diff-line diff-zero" id="diff-line">— in linea con il target</div>
      <div class="target-line">TARGET: 7h 36m/giorno · pausa: 30'</div>
    </div>
  </div>

  <div class="days-list" id="days-list"></div>

  <div class="summary-row">
    <div class="stat-card">
      <div class="stat-val" id="s-worked">0h 00m</div>
      <div class="stat-lbl">LAVORATE</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--text2)">38h 00m</div>
      <div class="stat-lbl">OBIETTIVO</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-diff">0h 00m</div>
      <div class="stat-lbl" id="s-diff-lbl">RIMANENTI</div>
    </div>
  </div>

  <div class="footer-note">
    Pausa 30' sottratta automaticamente<br>
    Dati salvati localmente sul dispositivo
  </div>
  <button class="clear-btn" id="clear-btn">✕ Azzera settimana corrente</button>
</div>

<button id="install-banner">⬇ Installa app</button>

<script>
const TARGET_WEEK = 38 * 60;
const TARGET_DAY  = TARGET_WEEK / 5;
const BREAK       = 30;
const DAYS_IT     = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì'];
const SHORT_IT    = ['LUN','MAR','MER','GIO','VEN'];

let weekOffset = 0;

// ---- date helpers ----
function getMonday(offset) {
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - ((d.getDay()+6)%7) + offset*7);
  return d;
}
function fmt(d) {
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
}
function getWeekNum(d) {
  const jan1 = new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-jan1)/86400000 + jan1.getDay()+1)/7);
}
function storageKey(offset) {
  const mon = getMonday(offset);
  return 'timbr-' + mon.toISOString().slice(0,10);
}

// ---- storage ----
function loadWeek(offset) {
  try {
    const raw = localStorage.getItem(storageKey(offset));
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return Array(5).fill(null).map(()=>({entry:'',exit:''}));
}
function saveWeek(offset, data) {
  try { localStorage.setItem(storageKey(offset), JSON.stringify(data)); } catch(e){}
}

// ---- calc ----
function t2m(t) {
  if (!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}
function minToHM(min, always) {
  if (min===null && !always) return '--:--';
  const abs = Math.abs(min||0);
  return Math.floor(abs/60)+'h '+String(abs%60).padStart(2,'0')+'m';
}
function calcDay(e,x) {
  const em=t2m(e), xm=t2m(x);
  if(em===null||xm===null||xm<=em) return null;
  return xm-em-BREAK;
}

// ---- render ----
function render() {
  const mon = getMonday(weekOffset);
  const wn  = getWeekNum(mon);
  const sun = new Date(mon.getTime()+4*86400000);

  document.getElementById('week-badge').textContent = 'W'+String(wn).padStart(2,'0')+' · '+mon.getFullYear();
  document.getElementById('nav-label').textContent =
    weekOffset===0 ? 'Settimana corrente' :
    weekOffset===-1 ? 'Settimana scorsa' :
    weekOffset < 0 ? Math.abs(weekOffset)+' sett. fa' : 'Settimana +'+weekOffset;
  document.getElementById('nav-dates').textContent = fmt(mon)+' — '+fmt(sun);
  document.getElementById('btn-next').disabled = weekOffset >= 0;
  document.getElementById('btn-prev').disabled = weekOffset <= -52;

  const data = loadWeek(weekOffset);
  const todayDow = weekOffset===0 ? (new Date().getDay()+6)%7 : -1;
  const dailyMins = data.map(d=>calcDay(d.entry,d.exit));
  const total = dailyMins.reduce((s,m)=>s+(m??0),0);
  const diff  = total - TARGET_WEEK;
  const pct   = Math.min(100, Math.round(total/TARGET_WEEK*100));

  // ring
  const circ = 2*Math.PI*38;
  const offset2 = circ*(1-pct/100);
  const ring = document.getElementById('ring-circle');
  ring.setAttribute('stroke-dashoffset', offset2.toFixed(2));
  ring.style.stroke = diff>=0 ? 'var(--green)' : 'var(--accent)';
  document.getElementById('ring-pct').textContent = pct+'%';

  // big
  document.getElementById('big-hours').innerHTML = minToHM(total,true)+' <small>/ 38h 00m</small>';
  const dl = document.getElementById('diff-line');
  if(diff===0) {
    dl.className='diff-line diff-zero'; dl.textContent='— in linea con il target';
  } else if(diff>0) {
    dl.className='diff-line diff-pos'; dl.textContent='↑ +'+minToHM(diff)+' straordinario';
  } else {
    dl.className='diff-line diff-neg'; dl.textContent='↓ mancano '+minToHM(-diff);
  }

  // summary
  document.getElementById('s-worked').textContent = minToHM(total,true);
  const sd = document.getElementById('s-diff');
  const sl = document.getElementById('s-diff-lbl');
  if(diff>=0){
    sd.textContent = minToHM(diff,true);
    sd.style.color = 'var(--green)';
    sl.textContent = 'STRAORD.';
  } else {
    sd.textContent = minToHM(-diff,true);
    sd.style.color = 'var(--accent)';
    sl.textContent = 'RIMANENTI';
  }

  // days
  const list = document.getElementById('days-list');
  list.innerHTML = '';
  data.forEach((day,i)=>{
    const worked = dailyMins[i];
    const dayDate = new Date(mon.getTime()+i*86400000);
    const dayDiff = worked!==null ? worked-TARGET_DAY : null;
    const isToday = todayDow===i;

    const card = document.createElement('div');
    card.className = 'day-card'+(isToday?' today':'');

    let resultClass = 'day-result empty';
    let resultText  = '--:--';
    let subText     = '– pausa 30\'';
    if(worked!==null){
      resultClass = 'day-result '+(dayDiff>=0?'pos':'neg');
      resultText  = minToHM(worked);
      subText     = (dayDiff>=0 ? '+' : '')+minToHM(dayDiff);
    }

    card.innerHTML = `
      <div class="day-header">
        <div>
          <div class="day-name">${isToday?'● ':''} ${SHORT_IT[i]} · ${DAYS_IT[i]}</div>
          <div class="day-date">${fmt(dayDate)}</div>
        </div>
        <div style="text-align:right">
          <div class="${resultClass}">${resultText}</div>
          <div class="day-sub" style="color:${worked===null?'var(--text3)':dayDiff>=0?'var(--green)':'var(--accent)'}">${subText}</div>
        </div>
      </div>
      <div class="day-inputs">
        <div class="input-group">
          <label>Entrata</label>
          <input type="time" value="${day.entry||''}" data-day="${i}" data-field="entry">
        </div>
        <div class="input-group">
          <label>Uscita</label>
          <input type="time" value="${day.exit||''}" data-day="${i}" data-field="exit">
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  // events on new inputs
  list.querySelectorAll('input[type=time]').forEach(inp=>{
    inp.addEventListener('change', e=>{
      const idx   = +e.target.dataset.day;
      const field = e.target.dataset.field;
      const d     = loadWeek(weekOffset);
      d[idx][field] = e.target.value;
      saveWeek(weekOffset, d);
      render();
    });
  });
}

document.getElementById('btn-prev').addEventListener('click',()=>{ weekOffset--; render(); });
document.getElementById('btn-next').addEventListener('click',()=>{ weekOffset++; render(); });
document.getElementById('clear-btn').addEventListener('click',()=>{
  if(confirm('Azzera tutti i dati della settimana?')){
    localStorage.removeItem(storageKey(weekOffset));
    render();
  }
});

// PWA install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'block';
});
document.getElementById('install-banner').addEventListener('click', async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  if(outcome==='accepted') document.getElementById('install-banner').style.display='none';
  deferredPrompt = null;
});

render();
</script>

<!-- PWA Service Worker -->
<script>
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'timbr-v1';
    self.addEventListener('install', e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.add('/')));
      self.skipWaiting();
    });
    self.addEventListener('fetch', e=>{
      e.respondWith(
        caches.match(e.request).then(r=>r||fetch(e.request))
      );
    });
  `;
  const blob = new Blob([swCode],{type:'application/javascript'});
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>

<!-- Manifest inline via link tag -->
<script>
const manifest = {
  name: 'Timbrature',
  short_name: 'TIMBR.',
  description: 'Registro ore lavorate settimanali',
  start_url: '.',
  display: 'standalone',
  background_color: '#0f0f1a',
  theme_color: '#1a1a2e',
  icons: [{
    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%231a1a2e'/%3E%3Ctext x='96' y='130' font-size='90' text-anchor='middle' font-family='monospace' font-weight='bold' fill='%23e94560'%3ET%3C/text%3E%3C/svg%3E",
    sizes: '192x192', type: 'image/svg+xml'
  }]
};
const blob = new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
const link = document.createElement('link');
link.rel = 'manifest';
link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

</body>
</html>
